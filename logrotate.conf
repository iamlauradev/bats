# =============================================================================
# BATS IoT — Configuración logrotate
# =============================================================================
# Instalar en el host (Raspberry Pi):
#   sudo cp logrotate.conf /etc/logrotate.d/bats
#
# Logrotate se ejecuta automáticamente cada noche via cron del sistema.
# Para probar manualmente:
#   sudo logrotate -f /etc/logrotate.d/bats
# =============================================================================

/var/log/bats/*.log {
    # Rotar diariamente
    daily

    # Mantener los últimos 14 ficheros (2 semanas de histórico)
    rotate 14

    # Comprimir los ficheros rotados con gzip
    compress

    # No comprimir el fichero recién rotado (esperar al siguiente ciclo)
    delaycompress

    # No fallar si el fichero no existe
    missingok

    # No rotar si el fichero está vacío
    notifempty

    # Crear nuevo fichero de log tras rotar, con permisos correctos
    create 0640 root root

    # Señal a los procesos para que reabran el fichero de log
    # (Flask usa RotatingFileHandler propio, no necesita señal externa,
    #  pero nginx sí necesita que se reabra su descriptor)
    postrotate
        # Recargar nginx si está corriendo
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
        fi
    endscript
}
