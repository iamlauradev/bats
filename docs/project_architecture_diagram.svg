<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 1180"
     font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">

    <!-- =========================================================================
         BATS IoT v1.0 — Diagrama vertical de arquitectura
         Pensado para insertar en una hoja de Google Docs (orientación retrato).
         Exportable a PNG con cualquier conversor (rsvg-convert, Inkscape,
         o desde el navegador con clic derecho > Guardar imagen como).
         ========================================================================= -->

    <defs>
        <!-- Sombra sutil reutilizable -->
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.18"/>
        </filter>

        <!-- Punta de flecha estándar -->
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f3a5f"/>
        </marker>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#c25e1c"/>
        </marker>
        <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
        </marker>

        <!-- Gradientes -->
        <linearGradient id="grad-container" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#3478c8"/>
            <stop offset="100%" stop-color="#1f5391"/>
        </linearGradient>
        <linearGradient id="grad-cloud" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#f78b30"/>
            <stop offset="100%" stop-color="#d56918"/>
        </linearGradient>
        <linearGradient id="grad-hardware" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#2a3d54"/>
            <stop offset="100%" stop-color="#0f1c2e"/>
        </linearGradient>
        <linearGradient id="grad-database" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#a0d8e8"/>
            <stop offset="100%" stop-color="#5fa9c0"/>
        </linearGradient>
        <linearGradient id="grad-external" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#fafafa"/>
            <stop offset="100%" stop-color="#e0e0e0"/>
        </linearGradient>
    </defs>

    <!-- Fondo -->
    <rect width="640" height="1180" fill="#ffffff"/>

    <!-- =====================================================================
         TÍTULO
         ===================================================================== -->
    <text x="320" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f1c2e">
        BATS IoT — Arquitectura
    </text>
    <text x="320" y="58" text-anchor="middle" font-size="11" fill="#5b6b7c" letter-spacing="2">
        v1.0 · DESPLIEGUE FINAL EN RASPBERRY PI 4
    </text>
    <line x1="180" y1="70" x2="460" y2="70" stroke="#cfd6df" stroke-width="1"/>

    <!-- =====================================================================
         CAPA 1 — USUARIOS DEL PANEL WEB (3 iconos en fila)
         ===================================================================== -->
    <g filter="url(#shadow)">
        <rect x="80" y="92" width="480" height="74" rx="10"
              fill="url(#grad-external)" stroke="#9aa6b3" stroke-width="1.2" stroke-dasharray="5 4"/>
    </g>
    <text x="320" y="111" text-anchor="middle" font-size="10" font-weight="700"
          fill="#5b6b7c" letter-spacing="2">USUARIOS DEL PANEL WEB</text>

    <!-- Admin -->
    <g transform="translate(160 140)">
        <circle r="16" fill="#1f3a5f"/>
        <circle cy="-4" r="5" fill="#fff"/>
        <path d="M -8 8 Q 0 0 8 8 L 8 11 L -8 11 Z" fill="#fff"/>
        <text y="32" text-anchor="middle" font-size="11" font-weight="600" fill="#1f3a5f">Administrador/a</text>
    </g>
    <!-- Tutor -->
    <g transform="translate(320 140)">
        <circle r="16" fill="#1f3a5f"/>
        <circle cy="-4" r="5" fill="#fff"/>
        <path d="M -8 8 Q 0 0 8 8 L 8 11 L -8 11 Z" fill="#fff"/>
        <text y="32" text-anchor="middle" font-size="11" font-weight="600" fill="#1f3a5f">Tutor/a</text>
    </g>
    <!-- Profesor -->
    <g transform="translate(480 140)">
        <circle r="16" fill="#1f3a5f"/>
        <circle cy="-4" r="5" fill="#fff"/>
        <path d="M -8 8 Q 0 0 8 8 L 8 11 L -8 11 Z" fill="#fff"/>
        <text y="32" text-anchor="middle" font-size="11" font-weight="600" fill="#1f3a5f">Profesor/a</text>
    </g>

    <!-- Flecha hacia Cloudflare -->
    <line x1="320" y1="170" x2="320" y2="206" stroke="#1f3a5f" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="295" y="178" width="50" height="18" rx="3" fill="#fff" stroke="#cfd6df" stroke-width="0.8"/>
    <text x="320" y="190" text-anchor="middle" font-size="10" fill="#1f3a5f" font-weight="600">HTTPS</text>

    <!-- =====================================================================
         CAPA 2 — CLOUDFLARE (HTTPS + Tunnel)
         ===================================================================== -->
    <g filter="url(#shadow)">
        <rect x="180" y="210" width="280" height="60" rx="14"
              fill="url(#grad-cloud)" stroke="#a04e0c" stroke-width="1.5"/>
    </g>
    <!-- Iconito nube -->
    <path d="M 220 240 c 0 -8 6 -14 14 -14 c 2 -7 9 -10 14 -8 c 5 -6 14 -4 16 4 c 7 0 12 5 12 11 c 0 7 -6 11 -12 11 l -34 0 c -6 0 -10 -3 -10 -4 z"
          fill="#fff" opacity="0.95"/>
    <text x="320" y="237" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Cloudflare</text>
    <text x="320" y="254" text-anchor="middle" font-size="11" fill="#fff" opacity="0.95">Edge HTTPS · Cloudflare Tunnel</text>

    <!-- Flecha al RPi -->
    <line x1="320" y1="270" x2="320" y2="308" stroke="#c25e1c" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
    <rect x="265" y="278" width="110" height="20" rx="3" fill="#fff" stroke="#cfd6df" stroke-width="0.8"/>
    <text x="320" y="291" text-anchor="middle" font-size="10" fill="#c25e1c" font-weight="700">Túnel cifrado</text>

    <!-- =====================================================================
         CAPA 3 — RASPBERRY PI 4 + STACK DOCKER (gran caja exterior)
         ===================================================================== -->
    <!-- Caja exterior RPi -->
    <g filter="url(#shadow)">
        <rect x="40" y="318" width="560" height="640" rx="14"
              fill="#f5f8fc" stroke="#1f3a5f" stroke-width="2"/>
    </g>
    <!-- Etiqueta superior RPi -->
    <rect x="200" y="305" width="240" height="26" rx="4" fill="#0f1c2e"/>
    <text x="320" y="323" text-anchor="middle" font-size="12" font-weight="700"
          fill="#fff" letter-spacing="2">RASPBERRY PI 4 B · DOCKER</text>

    <!-- ── Contenedor 1: cloudflared ─────────────────────────────────────── -->
    <g filter="url(#shadow)">
        <rect x="180" y="356" width="280" height="68" rx="10"
              fill="url(#grad-container)" stroke="#0f3460" stroke-width="1.2"/>
    </g>
    <!-- Hexágono Docker (deco) -->
    <path d="M 200 380 l 8 -5 l 8 5 l 0 10 l -8 5 l -8 -5 z" fill="#fff" opacity="0.85"/>
    <text x="320" y="382" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">cloudflared</text>
    <text x="320" y="400" text-anchor="middle" font-size="10.5" fill="#fff" opacity="0.95">cloudflare/cloudflared:latest</text>
    <text x="320" y="415" text-anchor="middle" font-size="10" fill="#fff" opacity="0.85">network_mode: host</text>

    <!-- Flecha cloudflared → web -->
    <line x1="320" y1="426" x2="320" y2="462" stroke="#1f3a5f" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="265" y="434" width="110" height="18" rx="3" fill="#fff" stroke="#cfd6df" stroke-width="0.8"/>
    <text x="320" y="446" text-anchor="middle" font-size="10" fill="#1f3a5f" font-weight="600">localhost:5000</text>

    <!-- ── Contenedor 2: web (Flask) ─────────────────────────────────────── -->
    <g filter="url(#shadow)">
        <rect x="120" y="464" width="400" height="92" rx="10"
              fill="url(#grad-container)" stroke="#0f3460" stroke-width="1.2"/>
    </g>
    <path d="M 140 488 l 8 -5 l 8 5 l 0 10 l -8 5 l -8 -5 z" fill="#fff" opacity="0.85"/>
    <text x="320" y="490" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">web · Flask + Python</text>
    <text x="320" y="510" text-anchor="middle" font-size="11" fill="#fff" opacity="0.95">Servidor web · Escáner Bluetooth · Lógica</text>
    <text x="320" y="527" text-anchor="middle" font-size="10" fill="#fff" opacity="0.85">port :5000 (sólo localhost) · privileged · network_mode: host</text>
    <text x="320" y="543" text-anchor="middle" font-size="10" fill="#fff" opacity="0.85">/var/run/dbus montado para BlueZ</text>

    <!-- ── Contenedor 3: scheduler (a la izquierda, en paralelo a web) ──── -->
    <g filter="url(#shadow)">
        <rect x="60" y="598" width="240" height="80" rx="10"
              fill="url(#grad-container)" stroke="#0f3460" stroke-width="1.2"/>
    </g>
    <path d="M 80 622 l 8 -5 l 8 5 l 0 10 l -8 5 l -8 -5 z" fill="#fff" opacity="0.85"/>
    <text x="180" y="624" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">scheduler</text>
    <text x="180" y="641" text-anchor="middle" font-size="10.5" fill="#fff" opacity="0.95">Alpine + crond</text>
    <text x="180" y="657" text-anchor="middle" font-size="9.5" fill="#fff" opacity="0.85">Gating cada N min · informe semanal</text>

    <!-- Flecha scheduler → web (curva por arriba) -->
    <path d="M 180 598 C 180 580 230 568 280 556"
          stroke="#1f3a5f" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
    <rect x="195" y="568" width="125" height="18" rx="3" fill="#fff" stroke="#cfd6df" stroke-width="0.8"/>
    <text x="257" y="580" text-anchor="middle" font-size="10" fill="#1f3a5f" font-weight="600">/estado-franja /escanear</text>

    <!-- ── Contenedor 4: db (MariaDB) ────────────────────────────────────── -->
    <g filter="url(#shadow)">
        <!-- Cilindro DB -->
        <ellipse cx="450" cy="608" rx="80" ry="14" fill="#5fa9c0" stroke="#0f3460" stroke-width="1.2"/>
        <rect x="370" y="608" width="160" height="58" fill="url(#grad-database)" stroke="#0f3460" stroke-width="1.2"/>
        <ellipse cx="450" cy="666" rx="80" ry="14" fill="url(#grad-database)" stroke="#0f3460" stroke-width="1.2"/>
        <ellipse cx="450" cy="608" rx="80" ry="14" fill="url(#grad-database)" stroke="#0f3460" stroke-width="1.2"/>
    </g>
    <text x="450" y="638" text-anchor="middle" font-size="13" font-weight="700" fill="#0f1c2e">db · MariaDB 10.11</text>
    <text x="450" y="654" text-anchor="middle" font-size="10" fill="#0f1c2e">:3306 · sólo localhost</text>

    <!-- Flecha web → db -->
    <line x1="380" y1="556" x2="425" y2="598" stroke="#1f3a5f" stroke-width="1.8" marker-end="url(#arrow)"/>
    <rect x="380" y="568" width="80" height="18" rx="3" fill="#fff" stroke="#cfd6df" stroke-width="0.8"/>
    <text x="420" y="580" text-anchor="middle" font-size="10" fill="#1f3a5f" font-weight="600">CRUD asistencia</text>

    <!-- ── Antena Bluetooth (hardware dentro de la RPi) ──────────────────── -->
    <g filter="url(#shadow)">
        <rect x="200" y="700" width="240" height="68" rx="10"
              fill="url(#grad-hardware)" stroke="#000" stroke-width="1.2"/>
    </g>
    <!-- Ondas BT -->
    <path d="M 230 736 q 8 -10 16 0 m -12 4 q 6 -8 12 0" stroke="#7bafd4" stroke-width="1.5" fill="none"/>
    <path d="M 410 736 q -8 -10 -16 0 m 12 4 q -6 -8 -12 0" stroke="#7bafd4" stroke-width="1.5" fill="none"/>
    <text x="320" y="730" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Antena Bluetooth USB</text>
    <text x="320" y="748" text-anchor="middle" font-size="10.5" fill="#fff" opacity="0.9">hci0 · BlueZ / bluetoothctl</text>
    <text x="320" y="762" text-anchor="middle" font-size="10" fill="#fff" opacity="0.8">accedida por web (privileged)</text>

    <!-- Flecha web → BT -->
    <line x1="320" y1="556" x2="320" y2="700" stroke="#1f3a5f" stroke-width="1.6" stroke-dasharray="2 4"/>

    <!-- =====================================================================
         CAPA 4 — MÓVILES DEL ALUMNADO (debajo del RPi)
         ===================================================================== -->
    <line x1="320" y1="768" x2="320" y2="824" stroke="#5b6b7c" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <rect x="270" y="788" width="100" height="20" rx="3" fill="#fff" stroke="#cfd6df" stroke-width="0.8"/>
    <text x="320" y="801" text-anchor="middle" font-size="10" fill="#5b6b7c" font-weight="600">Bluetooth · Pairing</text>

    <g filter="url(#shadow)">
        <rect x="180" y="828" width="280" height="78" rx="10"
              fill="url(#grad-external)" stroke="#9aa6b3" stroke-width="1.2" stroke-dasharray="5 4"/>
    </g>
    <!-- Móviles deco -->
    <g transform="translate(254 866)">
        <rect x="-8" y="-18" width="16" height="30" rx="2" fill="#1f3a5f"/>
        <rect x="-6" y="-15" width="12" height="23" fill="#7bafd4"/>
    </g>
    <g transform="translate(286 866)">
        <rect x="-8" y="-18" width="16" height="30" rx="2" fill="#1f3a5f"/>
        <rect x="-6" y="-15" width="12" height="23" fill="#7bafd4"/>
    </g>
    <g transform="translate(318 866)">
        <rect x="-8" y="-18" width="16" height="30" rx="2" fill="#1f3a5f"/>
        <rect x="-6" y="-15" width="12" height="23" fill="#7bafd4"/>
    </g>
    <g transform="translate(350 866)">
        <rect x="-8" y="-18" width="16" height="30" rx="2" fill="#1f3a5f"/>
        <rect x="-6" y="-15" width="12" height="23" fill="#7bafd4"/>
    </g>
    <g transform="translate(382 866)">
        <rect x="-8" y="-18" width="16" height="30" rx="2" fill="#1f3a5f"/>
        <rect x="-6" y="-15" width="12" height="23" fill="#7bafd4"/>
    </g>
    <text x="320" y="900" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1f3a5f">Móviles del alumnado</text>

    <!-- =====================================================================
         CAPA 5 — SERVICIOS EXTERNOS (notificaciones)
         Saliendo del web container hacia abajo
         ===================================================================== -->
    <text x="320" y="950" text-anchor="middle" font-size="10" font-weight="700"
          fill="#5b6b7c" letter-spacing="2">SERVICIOS EXTERNOS DE NOTIFICACIÓN</text>
    <line x1="180" y1="958" x2="460" y2="958" stroke="#cfd6df" stroke-width="1"/>

    <!-- SMTP -->
    <g filter="url(#shadow)">
        <rect x="60" y="980" width="240" height="80" rx="10"
              fill="url(#grad-external)" stroke="#9aa6b3" stroke-width="1.2"/>
    </g>
    <!-- Sobre -->
    <g transform="translate(98 1014)">
        <rect x="-14" y="-9" width="28" height="20" rx="2" fill="#1f3a5f"/>
        <path d="M -14 -9 L 0 4 L 14 -9 Z" fill="#7bafd4"/>
        <path d="M -14 -9 L 0 4 L 14 -9 Z" fill="none" stroke="#0f1c2e" stroke-width="0.5"/>
    </g>
    <text x="180" y="1006" text-anchor="middle" font-size="13" font-weight="700" fill="#1f3a5f">SMTP del centro</text>
    <text x="180" y="1024" text-anchor="middle" font-size="10.5" fill="#1f3a5f" opacity="0.85">Avisos a familias por correo</text>
    <text x="180" y="1040" text-anchor="middle" font-size="9.5" fill="#5b6b7c" opacity="0.8">SMTP TLS · cuenta del IES</text>

    <!-- Telegram -->
    <g filter="url(#shadow)">
        <rect x="340" y="980" width="240" height="80" rx="10"
              fill="url(#grad-external)" stroke="#9aa6b3" stroke-width="1.2"/>
    </g>
    <!-- Avión Telegram (simplificado) -->
    <g transform="translate(378 1014)">
        <circle r="14" fill="#229ED9"/>
        <path d="M -7 -1 L 7 -6 L 4 6 L 0 4 L -3 6 Z" fill="#fff"/>
    </g>
    <text x="460" y="1006" text-anchor="middle" font-size="13" font-weight="700" fill="#1f3a5f">Telegram Bot API</text>
    <text x="460" y="1024" text-anchor="middle" font-size="10.5" fill="#1f3a5f" opacity="0.85">Alertas al profesorado</text>
    <text x="460" y="1040" text-anchor="middle" font-size="9.5" fill="#5b6b7c" opacity="0.8">HTTPS api.telegram.org</text>

    <!-- Flechas web → SMTP, web → Telegram (cruzan el límite del RPi) -->
    <path d="M 180 556 C 180 800 100 850 110 980"
          stroke="#c25e1c" stroke-width="2" fill="none" stroke-dasharray="4 4" marker-end="url(#arrow-orange)"/>
    <path d="M 460 556 C 460 800 540 850 530 980"
          stroke="#c25e1c" stroke-width="2" fill="none" stroke-dasharray="4 4" marker-end="url(#arrow-orange)"/>

    <!-- =====================================================================
         LEYENDA (parte inferior)
         ===================================================================== -->
    <g transform="translate(40 1090)">
        <rect width="560" height="76" rx="8" fill="#fafafa" stroke="#cfd6df" stroke-width="1"/>
        <text x="14" y="20" font-size="10" font-weight="700" fill="#5b6b7c" letter-spacing="2">LEYENDA</text>

        <rect x="14" y="32" width="14" height="10" fill="#1f5391"/>
        <text x="34" y="42" font-size="10" fill="#1f3a5f">Contenedor Docker</text>

        <rect x="160" y="32" width="14" height="10" fill="#5fa9c0"/>
        <text x="180" y="42" font-size="10" fill="#1f3a5f">Base de datos</text>

        <rect x="280" y="32" width="14" height="10" fill="#0f1c2e"/>
        <text x="300" y="42" font-size="10" fill="#1f3a5f">Hardware RPi</text>

        <rect x="400" y="32" width="14" height="10" fill="#d56918"/>
        <text x="420" y="42" font-size="10" fill="#1f3a5f">Servicio en la nube</text>

        <rect x="14" y="52" width="14" height="10" fill="#fafafa" stroke="#9aa6b3" stroke-dasharray="2 2"/>
        <text x="34" y="62" font-size="10" fill="#1f3a5f">Actor / sistema externo</text>

        <line x1="160" y1="58" x2="186" y2="58" stroke="#1f3a5f" stroke-width="2" marker-end="url(#arrow)"/>
        <text x="194" y="62" font-size="10" fill="#1f3a5f">Conexión interna</text>

        <line x1="304" y1="58" x2="330" y2="58" stroke="#c25e1c" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-orange)"/>
        <text x="338" y="62" font-size="10" fill="#1f3a5f">Conexión saliente externa</text>
    </g>
</svg>
